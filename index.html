<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phoenix Forge - Device Repair Platform</title>
    <meta name="description" content="Rise from the Ashes. Every Device Reborn. Professional device repair and management platform." />
    <meta name="theme-color" content="#0A0A12" />
    
    <!-- Fonts - Modern & Professional -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Fallback fonts from original -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap">
    
    <link href="/src/main.css" rel="stylesheet" />
    
    <!-- Favicon would go here -->
    <style>
        /* Critical CSS for loading state */
        body {
            margin: 0;
            padding: 0;
            background: #0A0A12;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        #root {
            min-height: 100vh;
        }
        
        /* Smooth font rendering */
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0A0A12;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #1A1A38;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #4C1D95;
        }
        
        /* Selection color */
        ::selection {
            background: rgba(255, 77, 0, 0.3);
            color: #F1F5F9;
        }
    </style>
</head>

<body>
    <div id="root">
        <!-- Visible fallback in case the JS bundle fails to run -->
        <div id="boot-screen" style="
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #F1F5F9;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: radial-gradient(ellipse at 50% 50%, #0F0F1A 0%, #0A0A12 50%, #050508 100%);
        ">
            <div style="max-width: 900px; width: 100%; display: grid; gap: 10px;">
                <div style="font-size: 14px;">Loading Phoenix Forge…</div>
                <div id="boot-url" style="opacity: 0.8; font-size: 12px; letter-spacing: 0.02em; text-transform: none;"></div>
                <div id="boot-hint" style="opacity: 0.85; font-size: 12px; letter-spacing: 0.02em; text-transform: none;">
                    If this screen doesn’t disappear, make sure you opened <code style="background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 6px;">http://localhost:5001/</code> (not a <code style="background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 6px;">file://</code> path).
                </div>
                <pre id="boot-error" style="display:none; white-space: pre-wrap; opacity: 0.95; font-size: 12px; letter-spacing: 0; text-transform: none; background: rgba(0,0,0,0.35); padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);"></pre>
            </div>
        </div>
    </div>
    <script>
        (function () {
            var urlEl = document.getElementById('boot-url');
            if (urlEl) urlEl.textContent = 'URL: ' + String(window.location && window.location.href);

            var errEl = document.getElementById('boot-error');
            function showError(prefix, msg, stack) {
                if (!errEl) return;
                errEl.style.display = 'block';
                errEl.textContent = prefix + String(msg || '') + (stack ? ('\n\n' + String(stack)) : '');
            }

            window.addEventListener('error', function (e) {
                // Failed module loads typically show here (e.g. "Failed to load module script")
                showError('JS error: ', e && (e.message || e.type || e.error) , e && e.error && e.error.stack);
            });
            window.addEventListener('unhandledrejection', function (e) {
                var r = e && e.reason;
                showError('Unhandled rejection: ', r && (r.message || r), r && r.stack);
            });
        })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
